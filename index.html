<!-- Remplacez la ligne <h1>FinanceScan</h1> par celle-ci -->
<h1 style="color: red !important; display: block !important;">TEST VISUEL - FinanceScan</h1>
<!DOCTYPE html><html lang="fr"><script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyI_LaxyDo_D0WRIq4bh9Vq-YP6P1MniNwpMWFHFhgHWA1--FYASwneVBcLHAMoTP8v/exec"; 
    const MA_CLE = "Brocode33!";

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const status = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        
        status.innerText = "Envoi en cours...";
        spinner.style.display = "block";

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const base64Content = event.target.result.split(',')[1];
                const payload = JSON.stringify({
                    cle: MA_CLE,
                    fileContent: base64Content,
                    fileName: file.name,
                    mimeType: file.type
                });

                // On utilise une méthode plus simple pour Google
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload
                })
                .then(() => {
                    // Avec no-cors, on considère que si la requête est partie, c'est réussi
                    status.innerHTML = "<b style='color:#34C759'>✅ ENVOYÉ !</b><br>Vérifiez votre Google Sheet d'ici 10s.";
                    spinner.style.display = "none";
                })
                .catch(err => {
                    status.innerHTML = "❌ Erreur réseau : " + err;
                    spinner.style.display = "none";
                });
            } catch (err) {
                status.innerText = "Erreur lecture fichier : " + err;
            }
        };
        reader.readAsDataURL(file);
    });
</script></body></html>
