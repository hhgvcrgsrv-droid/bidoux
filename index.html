<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FinanceScan</title>
    <style>
        :root { --ios-blue: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .btn-scan { background: var(--ios-blue); color: white; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 600; display: block; cursor: pointer; text-decoration: none; margin-top: 20px; }
        #status { margin-top: 20px; font-size: 14px; color: #666; min-height: 40px; }
        .spinner { display: none; width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--ios-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="margin:0">FinanceScan</h1>
        <p style="color:#888">Capture de factures & payes</p>
        
        <div id="spinner" class="spinner"></div>
        <div id="status">Prêt pour le scan</div>

        <label for="fileInput" class="btn-scan">
            📷 SCANNER UN DOCUMENT
        </label>
        <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none">
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby75FGggVs6MvxhP8TWezRHrQ9wfeOKP8aR5DrBcNFXDTHFgPeuNCx4E-9UvoDBbYRN/exec"; 
        const MA_CLE = « Brocode33! »;
        // ---------------------

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            const spinner = document.getElementById('spinner');
            
            status.innerText = "Analyse et envoi en cours...";
            status.style.color = "#666";
            spinner.style.display = "block";

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Content = event.target.result.split(',')[1];
                
                const payload = {
                    cle: MA_CLE,
                    fileContent: base64Content,
                    fileName: file.name,
                    mimeType: file.type
                };

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Important pour Google Apps Script
                    body: JSON.stringify(payload)
                })
                .then(() => {
                    status.innerHTML = "<b style='color:#34C759'>✅ RÉUSSI !</b><br>Document archivé dans Drive et Sheets.";
                    spinner.style.display = "none";
                    document.getElementById('fileInput').value = ""; // Reset
                })
                .catch(err => {
                    status.innerHTML = "<b style='color:#FF3B30'>❌ ERREUR</b><br>Vérifiez votre connexion.";
                    spinner.style.display = "none";
                });
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
